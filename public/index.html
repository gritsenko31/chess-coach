<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
--bg: #0d1117;
--surface: #161b22;
--surface2: #1c2128;
--border: #30363d;
--border2: #21262d;
--text: #e6edf3;
--text-muted: #8b949e;
--text-faint: #484f58;
--accent: #238636;
--accent-h: #2ea043;
--warn: #9e6a03;
--warn-bg: #1f1c0d;
--err: #da3633;
--err-bg: #2a100a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700}
header span{color:var(--text-muted);font-size:13px}
.layout{max-width:1260px;margin:16px auto;padding:0 14px;display:grid;grid-template-columns:250px 1fr 275px;gap:14px;align-items:start}
.col{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px}
.card h2{font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.9px;margin-bottom:11px}
.field{margin-bottom:9px}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px}
select,input[type=password]{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 9px;font-size:13px;outline:none;font-family:inherit}
select:focus,input:focus{border-color:#388bfd}
.hint{font-size:11px;color:var(--text-faint);margin-top:3px}
.btn{display:block;width:100%;padding:8px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;font-family:inherit;transition:opacity .15s}
.btn:last-child{margin-bottom:0}
.btn:hover{opacity:.82}
.btn-g{background:var(--accent);color:#fff}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
#statusBar{margin-top:9px;padding:7px 10px;background:#0d1117;border-radius:7px;font-size:12px;border:1px solid var(--border);color:var(--text-muted)}
#statusBar.ready{color:#3fb950;border-color:var(--accent)}
#statusBar.thinking{color:#e3b341;border-color:var(--warn)}
#statusBar.err{color:#f85149;border-color:var(--err)}
.board-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.board-outer{display:flex;align-items:stretch;gap:0}
.rank-col{display:flex;flex-direction:column;width:18px;padding-right:3px}
.rank-col span{display:flex;align-items:center;justify-content:center;flex:1;font-size:11px;color:var(--text-faint);font-weight:500}
.board-main{display:flex;flex-direction:column}
#board{display:grid;grid-template-columns:repeat(8,1fr);width:100%;aspect-ratio:1/1;border:2px solid var(--border2);border-radius:4px;overflow:hidden}
.file-row{display:flex;padding-left:0;margin-top:3px}
.file-row span{flex:1;text-align:center;font-size:11px;color:var(--text-faint);font-weight:500}
.board-wrap{width:min(calc(100vw - 580px),540px);min-width:280px}
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.sq::before{content:'';display:block;padding-top:100%}
.sq>*{position:absolute}
.sq.light{background:#f0d9b5}
.sq.dark {background:#b58863}
.sq.sel {box-shadow:inset 0 0 0 3px rgba(56,139,253,.85)}
.sq.lm {box-shadow:inset 0 0 0 999px rgba(246,185,59,.28)}
.sq.dot::after{content:'';position:absolute;width:30%;height:30%;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
.sq.cap::after{content:'';position:absolute;inset:7%;border-radius:50%;border:5px solid rgba(0,0,0,.22);pointer-events:none}
.piece{font-size:clamp(18px,3.3vw,44px);line-height:1;pointer-events:none}
.piece.white{color:#fff;text-shadow:0 0 2px #000,0 0 2px #000,0 0 3px #000,1px 1px 1px rgba(0,0,0,.8)}
.piece.black{color:#1a1a1a;text-shadow:0 0 1px rgba(255,255,255,.6),0 0 2px rgba(255,255,255,.4)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:9px}
.p-wait {background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.p-exc {background:#0f2a1a;color:#3fb950;border:1px solid var(--accent)}
.p-good {background:#0f2a1a;color:#58c768;border:1px solid var(--accent)}
.p-ok {background:var(--warn-bg);color:#e3b341;border:1px solid var(--warn)}
.p-inacc {background:var(--warn-bg);color:#d29922;border:1px solid var(--warn)}
.p-miss {background:var(--err-bg);color:#f0883e;border:1px solid #bd561d}
.p-blund {background:var(--err-bg);color:#f85149;border:1px solid var(--err)}
.coach-box{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:11px;min-height:86px;font-size:13px;line-height:1.65;color:#c9d1d9;white-space:pre-wrap}
.coach-box.loading{color:var(--text-faint);font-style:italic}
.erow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border2);color:var(--text-muted)}
.erow span:last-child{color:var(--text);font-weight:600;max-width:58%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.moves-box{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:8px 11px;max-height:185px;overflow-y:auto;font-family:ui-monospace,monospace;font-size:12px;line-height:1.9;color:#8b949e}
@media(max-width:940px){.layout{grid-template-columns:1fr}.board-wrap{width:min(90vw,500px)}}
</style>
</head>
<body>
<header>
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2.2">
<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
</svg>
<h1>Chess Coach</h1>
<span>Built-in engine &middot; Sherlock mode</span>
</header>

<div class="layout">
<div class="col">
<div class="card">
<h2>AI Model</h2>
<div class="field">
<label>Model</label>
<select id="modelSel">
<option value="llama-3.1-8b-instant" selected>llama-3.1-8b-instant (fast)</option>
<option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile (smarter)</option>
<option value="llama-4-scout-17b-16e-instruct">llama-4-scout-17b</option>
</select>
</div>
</div>

<div class="card">
<h2>Engine</h2>
<div class="field">
<label>Your color</label>
<select id="myColor"><option value="w" selected>White</option><option value="b">Black</option></select>
</div>
<div class="field">
<label>Bot difficulty</label>
<select id="botDepth">
<option value="1">Beginner (depth 1)</option>
<option value="2" selected>Easy (depth 2)</option>
<option value="3">Medium (depth 3)</option>
<option value="4">Hard (depth 4)</option>
</select>
</div>
</div>

<div class="card">
<h2>Controls</h2>
<button class="btn btn-g" id="btnNew">&#9654; New Game</button>
<button class="btn btn-s" id="btnFlip">&#8645; Flip Board</button>
<button class="btn btn-s" id="btnUndo">&#8592; Undo Move</button>
<div id="statusBar" class="ready">Your move</div>
</div>
</div>

<div class="board-center">
<div class="board-outer">
<div class="rank-col" id="rankCol"></div>
<div class="board-main">
<div class="board-wrap">
<div id="board"></div>
</div>
<div class="file-row" id="fileRow"></div>
</div>
</div>
</div>

<div class="col">
<div class="card">
<h2>Coach Comment</h2>
<div id="pill" class="pill p-wait">&#9203; Waiting</div>
<div id="coachBox" class="coach-box">Make your move, Watson. I am watching.</div>
</div>
<div class="card">
<h2>Analysis</h2>
<div class="erow"><span>Eval before</span><span id="eBefore">—</span></div>
<div class="erow"><span>Eval after</span><span id="eAfter">—</span></div>
<div class="erow"><span>Best move</span><span id="eBest">—</span></div>
<div class="erow"><span>Model</span><span id="eModel">—</span></div>
</div>
<div class="card">
<h2>Move History</h2>
<div class="moves-box" id="movesBox">No moves yet.</div>
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
const SUPA_URL = 'https://eyfmbgytvycawomzdhrz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zm1iZ3l0dnljYXdvbXpkaHJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODU5NjEsImV4cCI6MjA5NDM2MTk2MX0.4e43hBU68oBtkfe8Ac-5OQkPhcxGiZjEvtqNDniJfPU';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentGameId = null;
let moveNumber = 0;
let gameFinishedSaved = false;

async function saveGameStart() {
  currentGameId = null;
  moveNumber = 0;
  gameFinishedSaved = false;
  try {
    const { data, error } = await supa
      .from('games')
      .insert({
        player_color: myColor,
        result: 'ongoing',
        pgn: '',
        moves_count: 0
      })
      .select()
      .single();

    if (error) {
      console.error('saveGameStart error:', error);
      return;
    }
    currentGameId = data.id;
  } catch (e) {
    console.error('saveGameStart exception:', e);
  }
}

async function saveMove(mv, evalScore, bestMove, aiComment) {
  if (!currentGameId || !mv) return;
  moveNumber++;
  try {
    const { error } = await supa.from('moves').insert({
      game_id: currentGameId,
      move_number: moveNumber,
      move_san: mv.san,
      eval_score: evalScore,
      best_move: bestMove || null,
      ai_comment: aiComment || ''
    });
    if (error) console.error('saveMove error:', error);
  } catch (e) {
    console.error('saveMove exception:', e);
  }
}

async function saveGameEnd(result) {
  if (!currentGameId || gameFinishedSaved) return;
  gameFinishedSaved = true;
  try {
    const { error } = await supa
      .from('games')
      .update({
        result,
        pgn: game.pgn(),
        moves_count: moveNumber
      })
      .eq('id', currentGameId);
    if (error) console.error('saveGameEnd error:', error);
  } catch (e) {
    console.error('saveGameEnd exception:', e);
  }
}

const ENGINE = (function(){
const VAL = {p:100,n:320,b:330,r:500,q:900,k:20000};
const PST = {
p:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
n:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
b:[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
r:[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],
q:[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],
k:[-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20]
};
function evalBoard(g){
let s=0;
const b=g.board();
for(let r=0;r<8;r++) for(let f=0;f<8;f++){
const p=b[r][f]; if(!p) continue;
const i=p.color==='w'?r*8+f:(7-r)*8+f;
const v=VAL[p.type]+PST[p.type][i];
s+=p.color==='w'?v:-v;
}
return s;
}
function ab(g,d,a,b,mx){
if(d===0||g.game_over()) return evalBoard(g);
const ms=g.moves();
if(mx){let bv=-Infinity;for(const m of ms){g.move(m);bv=Math.max(bv,ab(g,d-1,a,b,false));g.undo();a=Math.max(a,bv);if(b<=a)break;}return bv;}
else {let bv=Infinity;for(const m of ms){g.move(m);bv=Math.min(bv,ab(g,d-1,a,b,true));g.undo();b=Math.min(b,bv);if(b<=a)break;}return bv;}
}
function best(g,d){
const ms=g.moves({verbose:true});
if(!ms.length) return null;
const iw=g.turn()==='w';
let bv=iw?-Infinity:Infinity,bm=ms[0];
ms.sort(()=>Math.random()-.5);
for(const m of ms){g.move(m);const v=ab(g,d-1,-Infinity,Infinity,!iw);g.undo();if(iw?v>bv:v<bv){bv=v;bm=m;}}
return {move:bm,score:bv};
}
function quickEval(g,d){
if(g.game_over()) return {score:evalBoard(g),best:null};
const ms=g.moves({verbose:true});
if(!ms.length) return {score:evalBoard(g),best:null};
const iw=g.turn()==='w';
let bv=iw?-Infinity:Infinity,bm=ms[0];
ms.sort(()=>Math.random()-.5);
const qd=Math.min(d,2);
for(const m of ms){g.move(m);const v=ab(g,qd-1,-Infinity,Infinity,!iw);g.undo();if(iw?v>bv:v<bv){bv=v;bm=m;}}
return {score:bv,best:bm?bm.from+bm.to:null};
}
return {best,quickEval,evalBoard};
})();

const GLYPH={p:'♟',n:'♞',b:'♝',r:'♜',q:'♛',k:'♚'};
let game=new Chess(),orient='w',myColor='w',selSq=null,tgts=[],lastSq=[],busy=false;

function renderBoard(){
const boardEl=document.getElementById('board');
boardEl.innerHTML='';
const files=orient==='w'?['a','b','c','d','e','f','g','h']:['h','g','f','e','d','c','b','a'];
const ranks=orient==='w'?[8,7,6,5,4,3,2,1]:[1,2,3,4,5,6,7,8];
const rc=document.getElementById('rankCol');
rc.innerHTML='';
ranks.forEach(r=>{const s=document.createElement('span');s.textContent=r;rc.appendChild(s);});
const fr=document.getElementById('fileRow');
fr.innerHTML='';
files.forEach(f=>{const s=document.createElement('span');s.textContent=f;fr.appendChild(s);});
for(const rank of ranks){
for(const file of files){
const sq=file+rank;
const fi=file.charCodeAt(0)-97;
const light=(fi+rank)%2===0;
const div=document.createElement('div');
div.className='sq '+(light?'light':'dark');
div.dataset.sq=sq;
if(sq===selSq) div.classList.add('sel');
if(lastSq.includes(sq)) div.classList.add('lm');
if(tgts.includes(sq)) div.classList.add(game.get(sq)?'cap':'dot');
const p=game.get(sq);
if(p){
const pd=document.createElement('div');
pd.className='piece '+(p.color==='w'?'white':'black');
pd.textContent=GLYPH[p.type];
div.appendChild(pd);
}
div.addEventListener('click',onSqClick);
boardEl.appendChild(div);
}
}
updateHistory();
}

function onSqClick(e){
if(busy||game.game_over()||game.turn()!==myColor) return;
const sq=e.currentTarget.dataset.sq;
if(selSq){
const legal=game.moves({square:selSq,verbose:true});
const mv=legal.find(m=>m.to===sq);
if(mv){playerMove(selSq,sq);return;}
}
const p=game.get(sq);
if(p&&p.color===myColor){selSq=sq;tgts=game.moves({square:sq,verbose:true}).map(m=>m.to);}
else{selSq=null;tgts=[];}
renderBoard();
}

async function playerMove(from,to){
busy=true;selSq=null;tgts=[];
setStatus('Analyzing…','thinking');
const depth=parseInt(document.getElementById('botDepth').value);
const beforeScore=ENGINE.evalBoard(game);
const beforeInfo=ENGINE.quickEval(game,depth);
const fenBefore=game.fen();
const mv=game.move({from,to,promotion:'q'});
if(!mv){busy=false;renderBoard();return;}
lastSq=[from,to];
renderBoard();
const afterScore=ENGINE.evalBoard(game);
const fenAfter=game.fen();
const q=classify(beforeScore,afterScore,mv.color);
setPill(q);
document.getElementById('eBefore').textContent=fmtCp(beforeScore,mv.color);
document.getElementById('eAfter').textContent=fmtCp(afterScore,mv.color);
document.getElementById('eBest').textContent=beforeInfo.best||'—';
setCoach('Asking coach…',true);
try{
const r=await groqComment({fenBefore,fenAfter,mv,beforeScore,afterScore,q,bestMove:beforeInfo.best});
setCoach(r.text,false);
document.getElementById('eModel').textContent=r.model;
await saveMove(mv, afterScore, beforeInfo.best, r.text);
}catch(err){
const txt=tplComment(mv,q,beforeInfo.best);
setCoach(txt,false);
document.getElementById('eModel').textContent='template';
await saveMove(mv, afterScore, beforeInfo.best, txt);
}
busy=false;
if(!game.game_over()&&game.turn()!==myColor){setStatus('Bot thinking…','thinking');setTimeout(botMove,80);}
else updateStatusMsg();
}

function botMove(){
if(game.game_over()) return;
const depth=parseInt(document.getElementById('botDepth').value);
const r=ENGINE.best(game,depth);
if(!r){updateStatusMsg();return;}
const mv=game.move(r.move);
if(mv) lastSq=[mv.from,mv.to];
renderBoard();
updateStatusMsg();
}

function fmtCp(cp,col){
let v=cp/100;if(col==='b')v=-v;
return(v>=0?'+':'')+v.toFixed(2);
}
function classify(b,a,col){
const d=col==='w'?a-b:b-a;
if(d>=80) return{txt:'Excellent!',cls:'p-exc',ic:'✨'};
if(d>=10) return{txt:'Good',cls:'p-good',ic:'✅'};
if(d>-30) return{txt:'OK',cls:'p-ok',ic:'🟡'};
if(d>-100) return{txt:'Inaccuracy',cls:'p-inacc',ic:'⚠️'};
if(d>-250) return{txt:'Mistake',cls:'p-miss',ic:'❌'};
return{txt:'Blunder',cls:'p-blund',ic:'💀'};
}

async function groqComment({fenAfter,mv,beforeScore,afterScore,q,bestMove}){
const model=document.getElementById('modelSel').value;
const pgn=game.pgn()||'Game just started.';
const prompt='Move: '+mv.san+'\nQuality: '+q.txt+'\nFEN: '+fenAfter+'\nScore before: '+beforeScore+'\nScore after: '+afterScore+'\nBest move: '+(bestMove||'unknown')+'\nFull game PGN so far:\n'+pgn+'\n\nComment on this move in 2-3 short sentences. Be sharp and dry like a brilliant British detective. Reference the game context if relevant. Call the player Watson occasionally. No numbers. Plain text only.';
const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
model,
temperature:0.45,
max_tokens:160,
messages:[
{role:'system',content:'You are a chess commentator with the personality of a brilliant dry British detective. Sharp, slightly arrogant, short punchy sentences. You deduce, you do not explain. Address the player as Watson occasionally.'},
{role:'user',content:prompt}
]
})
});
if(!res.ok) throw new Error(res.status);
const text=((await res.json()).choices?.[0]?.message?.content||'').trim();
return{text,model};
}

function tplComment(mv,q,best){
const b=best||'something more sensible';
if(q.txt==='Excellent!') return mv.san+'. Finally. You saw what the position demanded. Well done, Watson.';
if(q.txt==='Good') return mv.san+'. Competent. The plan is clear and correct. I expected nothing less.';
if(q.txt==='OK') return mv.san+'. Adequate. Though '+b+' was the more logical deduction here.';
if(q.txt==='Inaccuracy') return mv.san+'. You missed something. '+b+' followed directly from the position.';
if(q.txt==='Mistake') return mv.san+'. A mistake, Watson. Your opponent will not be so generous as to ignore it.';
return mv.san+'. A blunder. '+b+' was obvious. The position made no attempt to hide it.';
}

function setStatus(msg,cls){const el=document.getElementById('statusBar');el.textContent=msg;el.className=cls||'';}
function updateStatusMsg(){
if(game.in_checkmate()) {
  const result = game.turn()===myColor ? 'loss' : 'win';
  saveGameEnd(result);
  return setStatus(game.turn()==='w'?'Black wins!':'White wins!','err');
}
if(game.in_draw()) {
  saveGameEnd('draw');
  return setStatus('Draw!','thinking');
}
setStatus(game.turn()===myColor?'Your move':'Bot to move…',game.turn()===myColor?'ready':'thinking');
}
function setPill(q){const el=document.getElementById('pill');el.textContent=q.ic+' '+q.txt;el.className='pill '+q.cls;}
function setCoach(txt,loading){const el=document.getElementById('coachBox');el.textContent=txt;el.className='coach-box'+(loading?' loading':'');}
function updateHistory(){
const h=game.history();
if(!h.length){document.getElementById('movesBox').textContent='No moves yet.';return;}
let out='';for(let i=0;i<h.length;i+=2)out+=(Math.floor(i/2)+1)+'. '+h[i]+(h[i+1]?' '+h[i+1]:'')+'\n';
const el=document.getElementById('movesBox');el.textContent=out;el.scrollTop=el.scrollHeight;
}

function startGame(){
game=new Chess();
myColor=document.getElementById('myColor').value;
orient=myColor;
selSq=null;
tgts=[];
lastSq=[];
busy=false;
setPill({txt:'Waiting',cls:'p-wait',ic:'⏳'});
setCoach('Make a move to receive coaching.',false);
['eBefore','eAfter','eBest','eModel'].forEach(id=>document.getElementById(id).textContent='—');
renderBoard();
saveGameStart();
if(myColor==='b'){setStatus('Bot thinking…','thinking');setTimeout(botMove,250);}
else setStatus('Your move','ready');
}

document.getElementById('btnNew').addEventListener('click',startGame);
document.getElementById('btnFlip').addEventListener('click',()=>{orient=orient==='w'?'b':'w';renderBoard();});
document.getElementById('btnUndo').addEventListener('click',()=>{
game.undo();
game.undo();
lastSq=[];
selSq=null;
tgts=[];
renderBoard();
setCoach('Move undone.',false);
setPill({txt:'Waiting',cls:'p-wait',ic:'⏳'});
updateStatusMsg();
});
document.getElementById('myColor').addEventListener('change',startGame);
startGame();
</script>
